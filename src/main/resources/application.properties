
# Spring Boot Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/agrisupply_db
# Or use individual properties:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=agrisupply_db
# spring.data.mongodb.username= # Add username if authentication is enabled
# spring.data.mongodb.password= # Add password if authentication is enabled
# spring.data.mongodb.authentication-database=admin # Usually 'admin' or the database itself

# JWT Configuration
# IMPORTANT: Replace with a strong, Base64-encoded secret key of at least 256 bits (32 bytes)
# Generate one using: openssl rand -base64 32
# Example (DO NOT USE THIS IN PRODUCTION):
app.jwtSecret=yourStrongBase64EncodedSecretKeyHere32BytesOrMore=
app.jwtExpirationInMs=86400000 # 24 hours

# Logging Configuration (Optional)
logging.level.org.springframework.security=DEBUG # Set to DEBUG for more security logs
logging.level.com.example.agrisupply=INFO # Set your application's log level

# Spring Scheduling (Enabled via annotation, but can configure pool size etc. here if needed)
# spring.task.scheduling.pool.size=10
