# =======================================
# Test Environment Properties (`test` profile)
# =======================================
# These properties override those in application.properties when the 'test' profile is active.

# --- Database ---
# Use a different database for testing to avoid conflicts with development data
# Ensure this database exists or MongoDB can create it.
spring.data.mongodb.uri=mongodb://localhost:27017/agrisupply_test_db?retryWrites=true&w=majority
# Or use separate properties:
# spring.data.mongodb.database=agrisupply_test_db

# --- JWT ---
# Use a FIXED, known (but still secure length) secret for reproducible tests.
# DO NOT use this key outside of a controlled test environment.
# This key is 256 bits, generated specifically for testing.
app.jwtSecret=AОченьБезопасныйКлючДляТестирования1234567890+=

# Use a shorter token expiration for tests (e.g., 1 hour = 3600000 ms or shorter if needed)
app.jwtExpirationInMs=600000 # 10 minutes for testing

# --- Logging ---
# Increase log levels for tests to get more details if needed
logging.level.root=INFO
logging.level.com.example.agrisupply=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb.core=DEBUG # See Mongo queries

# --- Scheduling ---
# Disable scheduler during most unit/integration tests unless specifically testing scheduled tasks.
# Prevents the BiddingService scheduler from running automatically during tests.
# You can trigger scheduled methods manually in tests if needed.
# spring.task.scheduling.enabled=false # Uncomment to disable scheduler in tests

# --- Other Test Configurations ---
# Example: Different server port for tests if needed (uncommon)
# server.port=8081